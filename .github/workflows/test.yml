name: Testing Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Linting & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: TypeScript type check
        run: pnpm type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unit-tests
          name: unit-tests-coverage

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Initialize Supabase (if not exists)
        run: |
          if [ ! -d "supabase" ]; then
            supabase init
          fi

      - name: Start Supabase
        run: supabase start

      # Export Supabase credentials using -o env format (recommended by docs)
      - name: Run database migrations
        run: |
          set -a  # Auto-export all variables
          eval "$(supabase status -o env 2>/dev/null)"
          set +a
          echo "Checking if vars are set:"
          echo "API_URL=$API_URL"
          echo "Has ANON_KEY: $([ -n \"$ANON_KEY\" ] && echo yes || echo no)"
          echo "Has SERVICE_ROLE_KEY: $([ -n \"$SERVICE_ROLE_KEY\" ] && echo yes || echo no)"
          export POSTGRES_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          export NEXT_PUBLIC_SUPABASE_URL="$API_URL"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="$ANON_KEY"
          export SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          pnpm db:migrate

      - name: Run integration tests
        run: |
          set -a  # Auto-export all variables
          eval "$(supabase status -o env 2>/dev/null)"
          set +a
          export POSTGRES_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          export NEXT_PUBLIC_SUPABASE_URL="$API_URL"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="$ANON_KEY"
          export SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          pnpm test:integration

      - name: Stop Supabase
        if: always()
        run: supabase stop

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: integration-tests
          name: integration-tests-coverage

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Initialize Supabase (if not exists)
        run: |
          if [ ! -d "supabase" ]; then
            supabase init
          fi

      - name: Start Supabase
        run: supabase start

      # Export Supabase credentials using -o env format (recommended by docs)
      - name: Run database migrations
        run: |
          set -a
          eval "$(supabase status -o env 2>/dev/null)"
          set +a
          export POSTGRES_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          export NEXT_PUBLIC_SUPABASE_URL="$API_URL"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="$ANON_KEY"
          export SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          pnpm db:migrate

      - name: Build application
        run: |
          set -a
          eval "$(supabase status -o env 2>/dev/null)"
          set +a
          export POSTGRES_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          export NEXT_PUBLIC_SUPABASE_URL="$API_URL"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="$ANON_KEY"
          export SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          pnpm build

      - name: Run E2E tests
        run: |
          set -a
          eval "$(supabase status -o env 2>/dev/null)"
          set +a
          export POSTGRES_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          export NEXT_PUBLIC_SUPABASE_URL="$API_URL"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="$ANON_KEY"
          export SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          export PLAYWRIGHT_TEST_BASE_URL="http://localhost:3000"
          pnpm test:e2e

      - name: Stop Supabase
        if: always()
        run: supabase stop

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate coverage report
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: all-tests
          name: full-coverage

      - name: Check coverage thresholds
        run: |
          echo "Checking coverage thresholds..."
          pnpm test:coverage --reporter=json --outputFile=coverage-summary.json
          # Add threshold checking logic here if needed
